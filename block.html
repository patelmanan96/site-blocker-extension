<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Blocked — Stay Focused</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: #fff;
  }
  body {
    display: flex;
    justify-content: center;
    padding: 7vh 5vw 4vh;
  }
  .wrap {
    width: 100%;
    max-width: 900px;
    text-align: center;
  }
  .icon {
    font-size: clamp(48px, 8vw, 88px);
    margin-bottom: clamp(8px, 1.5vh, 18px);
  }
  h1 {
    font-size: clamp(28px, 4.5vw, 52px);
    margin: 0 0 clamp(8px, 1.5vh, 16px);
    line-height: 1.2;
  }
  .site {
    color: #ffd166;
    font-weight: 600;
  }
  .sub {
    color: #cbd5e1;
    font-size: clamp(15px, 1.8vw, 20px);
    margin-bottom: clamp(24px, 4vh, 44px);
  }
  .quote-card {
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 20px;
    padding: clamp(28px, 5vh, 56px) clamp(24px, 6vw, 64px);
    backdrop-filter: blur(6px);
  }
  .quote {
    font-size: clamp(24px, 3.4vw, 40px);
    line-height: 1.5;
    font-style: italic;
    margin: 0 0 clamp(10px, 2vh, 20px);
  }
  .author {
    font-size: clamp(14px, 1.6vw, 18px);
    color: #ffd166;
    letter-spacing: 0.5px;
  }
  .back {
    display: inline-block;
    margin-top: clamp(28px, 5vh, 48px);
    padding: clamp(12px, 1.6vh, 16px) clamp(24px, 3vw, 32px);
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    text-decoration: none;
    font-size: clamp(15px, 1.8vw, 18px);
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">🚧</div>
    <h1>Blocked: <span class="site" id="site"></span></h1>
    <div class="sub">This site is off-limits right now. Go build something instead.</div>
    <div class="quote-card">
      <p class="quote" id="quote"></p>
      <div class="author" id="author"></div>
    </div>
    <button class="back" id="back">← Go Back</button>
  </div>
  <script src="block.js"></script>
</body>
</html>
