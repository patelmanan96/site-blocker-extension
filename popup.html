<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Focus Blocker</title>
<link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="card">
    <h1>🎯 Focus Blocker</h1>

    <div class="locked-note">🔒 Adult content is always blocked, in every mode, in normal and Incognito windows — this cannot be turned off.</div>

    <div class="mode-switch">
      <label class="mode-option">
        <input type="radio" name="mode" value="block" id="mode-block" />
        <span>Block these sites</span>
      </label>
      <label class="mode-option">
        <input type="radio" name="mode" value="whitelist" id="mode-whitelist" />
        <span>Only allow these sites</span>
      </label>
    </div>

    <label class="list-label" id="list-label">Sites (one per line, e.g. facebook.com)</label>
    <textarea id="sites" placeholder="facebook.com&#10;youtube.com&#10;reddit.com"></textarea>

    <button id="save">Save Settings</button>
    <div id="status"></div>

    <div id="confirm-panel" class="confirm-panel hidden">
      <p class="confirm-warning">⚠️ This reduces blocking. Wait <strong><span id="countdown">30</span>s</strong>, then type <strong id="confirm-phrase-label"></strong> below to confirm.</p>
      <input type="text" id="confirm-input" disabled />
      <div class="confirm-actions">
        <button id="cancel-btn" class="cancel-btn">Cancel</button>
        <button id="confirm-btn" disabled>Confirm Change</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
